name: Global Rivals News Bot

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours to stay fresh
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Bot
        run: python bot.py

      - name: Push Updates
        run: |
          git config --global user.name 'GlobalRivalsBot'
          git config --global user.email 'bot@rivals.com'
          git add news.json
          git commit -m "Automated Global News Update [Skip CI]" || exit 0
          git push
