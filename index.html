<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivals News Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0c0c0c; color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161616; padding: 30px; border-radius: 15px; border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        
        /* Sectiunea About */
        .about-section { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 30px; text-align: left; border-bottom: 3px solid #00ff88; }
        .about-section h2 { color: #00ff88; margin-top: 0; }
        .about-section p { color: #ccc; line-height: 1.6; }

        h1 { color: #00ff88; text-transform: uppercase; letter-spacing: 2px; }
        .news-item { background: #1a1a1a; margin: 15px 0; padding: 20px; border-radius: 8px; text-align: left; border-left: 5px solid #00d9ff; }
        .news-title { color: #fff; font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 5px; }
        .date { font-size: 12px; color: #00d9ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ROBLOX RIVALS NEWS HUB</h1>
        
        <!-- Aici scrii tu despre site-ul tau -->
        <div class="about-section">
            <h2>Welcome to the Hub! 🎮</h2>
            <p>This is your #1 source for <b>Roblox Rivals</b> updates. Our automated bot scans the web daily to bring you the latest leaks, codes, and patch notes. We track the meta so you don't have to!</p>
            <p style="font-size: 0.9em; color: #888;"><i>Status: Bot Online | Tracking Season 5</i></p>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">
        
        <div id="news-container">Loading latest news...</div>
    </div>

    <script>
        fetch('./news.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                data.articles.forEach(art => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `<span class="news-title">${art.title}</span><span class="date">📅 ${art.date}</span>`;
                    container.appendChild(div);
                });
            })
            .catch(() => {
                document.getElementById('news-container').innerHTML = "No news today. Check back tomorrow!";
            });
    </script>
</body>
</html>
