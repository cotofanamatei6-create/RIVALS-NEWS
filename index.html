<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Rivals News Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0c0c0c; color: white; text-align: center; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #161616; padding: 30px; border-radius: 15px; border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        h1 { color: #00ff88; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        #update-time { font-size: 0.85em; color: #888; margin-bottom: 20px; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
        .news-item { background: #222; margin: 15px 0; padding: 20px; border-radius: 10px; text-align: left; border-left: 5px solid #00d9ff; transition: transform 0.2s; }
        .news-item:hover { transform: scale(1.02); background: #282828; }
        .news-title { color: #ffffff; font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 8px; line-height: 1.4; }
        .date { font-size: 12px; color: #00d9ff; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ROBLOX RIVALS NEWS</h1>
        <p id="update-time">Checking for updates...</p>
        <hr>
        <div id="news-container">Loading latest announcements...</div>
    </div>

    <script>
        // Adaugam un cod random (?v=...) ca sa forteze browserul sa vada noutatile imediat
        fetch('./news.json?v=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error("Database not ready yet");
                return response.json();
            })
            .then(data => {
                document.getElementById('update-time').innerText = "Last Sync: " + data.last_update;
                const container = document.getElementById('news-container');
                container.innerHTML = ''; 

                if (!data.articles || data.articles.length === 0) {
                    container.innerHTML = "<p style='color: #888;'>No new updates found. Check back later!</p>";
                } else {
                    data.articles.forEach(art => {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        // Aici am pus doar TEXT, nu mai exista tag-ul <a> pentru click
                        div.innerHTML = `
                            <span class="news-title">${art.title}</span>
                            <span class="date">📅 ${art.date}</span>
                        `;
                        container.appendChild(div);
                    });
                }
            })
            .catch(error => {
                console.error(error);
                document.getElementById('news-container').innerHTML = 
                    "<b style='color: #ff4444;'>SYSTEM STATUS:</b> <br>The bot is currently scanning for news. <br>Please refresh in 1 minute!";
            });
    </script>

</body>
</html>
